version: 2

models:
  - name: dim_store
    description: "Dimension table for store."
    columns:
      - name: store_number
        description: "The primary key for this table"
        tests:
          - unique
          - not_null
      - name: store_name
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: string
      - name: address
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: string   
      - name: city
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: string 
      - name: zip_code
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: string    
      - name: county_number
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: string   
      - name: county
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: string                                                  
  - name: dim_item
    description: "Dimension table for item."
    columns:
      - name: item_number
        description: "The primary key for this table"
        tests:
          - unique
          - not_null
      - name: item_description
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: string  
      - name: category
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: string  
      - name: category_name
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: string 
      - name: vendor_number
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: string 
      - name: vendor_name
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: string
      - name: pack
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 160
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: int64
      - name: bottle_volume_ml
        tests: 
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 378000
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: int64
